<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0c10">
    <title>Cinephiler Paradox | Movies & TV Shows</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            background-color: #0a0c10;
            color: white;
        }
        ::selection {
            background-color: rgba(192, 38, 211, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- API Configuration ---
        const TMDB_KEY = "65ed25f3cfde7361bd51f6d498fb34a0";
        const TMDB_BASE_URL = "https://api.themoviedb.org/3";
        const IMG_BASE = "https://image.tmdb.org/t/p/w500";
        const IMG_ORIGINAL = "https://image.tmdb.org/t/p/original";

        // --- Server Ping Utility ---
        const pingServer = async (url) => {
          const start = Date.now();
          try {
            await fetch(url, { mode: 'no-cors', cache: 'no-store' });
            return Date.now() - start;
          } catch (e) {
            return 9999; 
          }
        };

        // --- Icon Wrappers ---
        const Search = ({size, className}) => <i className={`fa-solid fa-magnifying-glass ${className || ''}`} style={{fontSize: size}}></i>;
        const HomeIcon = ({size, className}) => <i className={`fa-solid fa-house ${className || ''}`} style={{fontSize: size}}></i>;
        const PlayCircle = ({size, className}) => <i className={`fa-solid fa-circle-play ${className || ''}`} style={{fontSize: size}}></i>;
        const ArrowLeft = ({size, className}) => <i className={`fa-solid fa-arrow-left ${className || ''}`} style={{fontSize: size}}></i>;
        const Star = ({size, className}) => <i className={`fa-solid fa-star ${className || ''}`} style={{fontSize: size}}></i>;
        const Tv = ({size, className}) => <i className={`fa-solid fa-tv ${className || ''}`} style={{fontSize: size}}></i>;
        const Film = ({size, className}) => <i className={`fa-solid fa-film ${className || ''}`} style={{fontSize: size}}></i>;
        const Info = ({size, className}) => <i className={`fa-solid fa-circle-info ${className || ''}`} style={{fontSize: size}}></i>;
        const Calendar = ({size, className}) => <i className={`fa-solid fa-calendar-days ${className || ''}`} style={{fontSize: size}}></i>;
        const InfinityIcon = ({size, className}) => <i className={`fa-solid fa-infinity ${className || ''}`} style={{fontSize: size}}></i>;
        const ChevronRight = ({size, className}) => <i className={`fa-solid fa-chevron-right ${className || ''}`} style={{fontSize: size}}></i>;
        const FilterIcon = ({size, className}) => <i className={`fa-solid fa-filter ${className || ''}`} style={{fontSize: size}}></i>;
        const Clock = ({size, className}) => <i className={`fa-solid fa-clock-rotate-left ${className || ''}`} style={{fontSize: size}}></i>;
        const ServerIcon = ({size, className}) => <i className={`fa-solid fa-server ${className || ''}`} style={{fontSize: size}}></i>;
        const LayerGroup = ({size, className}) => <i className={`fa-solid fa-layer-group ${className || ''}`} style={{fontSize: size}}></i>;

        // --- Custom Image Fallback Component ---
        const ImageWithFallback = ({ src, alt, className }) => {
          const [hasError, setHasError] = useState(false);

          if (hasError || !src || src.includes('null') || src.includes('undefined')) {
            return (
              <div className={`flex flex-col items-center justify-center bg-gray-900/80 ${className}`}>
                <div className="relative flex items-center justify-center w-12 h-12 md:w-16 md:h-16 rounded-xl bg-gradient-to-br from-violet-600/10 via-fuchsia-600/10 to-orange-500/10 mb-3 shadow-[0_0_15px_rgba(192,38,211,0.1)]">
                   <Film size={24} className="absolute -rotate-12 opacity-40 text-orange-300" />
                   <InfinityIcon size={32} className="absolute text-fuchsia-400 opacity-60 drop-shadow-[0_0_5px_rgba(192,38,211,0.4)]" />
                </div>
                <span className="text-xs md:text-sm text-gray-500 font-bold px-4 text-center line-clamp-2 max-w-full">{alt}</span>
              </div>
            );
          }

          return (
            <img
              src={src}
              alt={alt}
              className={className}
              onError={() => setHasError(true)}
              loading="lazy"
            />
          );
        };

        // --- Components ---
        const Navbar = ({ view, setView }) => (
          <nav className="sticky top-0 z-50 bg-[#0a0c10]/80 backdrop-blur-xl border-b border-gray-800/50">
            <div className="container mx-auto px-4 lg:px-8 h-16 flex items-center justify-between">
              <div 
                className="flex items-center gap-3 cursor-pointer group" 
                onClick={() => setView('home')}
              >
                <div className="relative flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 via-fuchsia-600 to-orange-500 p-[2px] shadow-[0_0_20px_rgba(192,38,211,0.4)] group-hover:shadow-[0_0_30px_rgba(192,38,211,0.6)] transition-all duration-300">
                  <div className="absolute inset-0 bg-[#0a0c10] rounded-[10px] opacity-80 group-hover:opacity-40 transition-opacity"></div>
                  <div className="relative flex items-center justify-center text-white">
                     <Film size={18} className="absolute -rotate-12 opacity-50 group-hover:rotate-0 group-hover:opacity-80 transition-all duration-500 text-orange-300" />
                     <InfinityIcon size={22} className="absolute text-fuchsia-400 opacity-100 group-hover:scale-110 group-hover:text-fuchsia-300 transition-all duration-500 drop-shadow-[0_0_8px_rgba(192,38,211,0.8)]" />
                  </div>
                </div>
                <span className="text-xl md:text-2xl font-black tracking-tighter flex items-center">
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400">Cinephiler</span>
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-orange-400 ml-1.5">Paradox</span>
                </span>
              </div>
              <div className="flex space-x-1 sm:space-x-3">
                <button 
                  onClick={() => setView('home')} 
                  className={`px-4 py-2 rounded-full flex items-center gap-2 transition-all duration-300 ${view === 'home' ? 'bg-white/10 text-white shadow-inner' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                >
                  <HomeIcon size={16} />
                  <span className="hidden sm:inline font-medium text-sm">Home</span>
                </button>
                <button 
                  onClick={() => setView('discover')} 
                  className={`px-4 py-2 rounded-full flex items-center gap-2 transition-all duration-300 ${view === 'discover' ? 'bg-white/10 text-white shadow-inner' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                >
                  <Search size={16} />
                  <span className="hidden sm:inline font-medium text-sm">Discover</span>
                </button>
              </div>
            </div>
          </nav>
        );

        const MovieCard = ({ item, onClick }) => {
          const title = item.title || item.name;
          const date = item.release_date || item.first_air_date;
          const year = date ? date.split('-')[0] : 'N/A';
          const isTV = item.media_type === 'tv';
          const isCollection = item.media_type === 'collection';
          
          return (
            <div onClick={() => onClick(item)} className="group/card cursor-pointer flex flex-col gap-3 h-full transition-all duration-300 hover:-translate-y-2 hover:scale-[1.03]">
              <div className="relative aspect-[2/3] overflow-hidden rounded-xl bg-gray-800 shadow-lg border border-gray-800">
                <ImageWithFallback 
                  src={item.poster_path ? `${IMG_BASE}${item.poster_path}` : null} 
                  alt={title}
                  className="w-full h-full object-cover transition-transform duration-500 group-hover/card:scale-110"
                />
                
                {item.resumeSeason && !isTV && !isCollection && (
                   <div className="absolute top-0 left-0 w-full h-1 bg-gray-800">
                      <div className="h-full bg-[#c026d3] w-1/2"></div>
                   </div>
                )}
                
                {!isCollection && (
                  <div className="absolute top-3 right-3 bg-black/70 backdrop-blur-md text-xs px-2.5 py-1.5 rounded-lg text-white font-bold flex items-center gap-1.5 shadow-xl">
                    <Star size={10} className="text-yellow-400" />
                    {item.vote_average?.toFixed(1) || 'NR'}
                  </div>
                )}
                
                <div className="absolute top-3 left-3 bg-black/70 backdrop-blur-md text-xs px-2 py-1.5 rounded-lg text-white font-bold flex items-center gap-1.5 shadow-xl">
                  {isCollection ? <LayerGroup size={10} className="text-fuchsia-400" /> : (isTV ? <Tv size={10} className="text-[#c026d3]" /> : <Film size={10} className="text-indigo-400" />)}
                </div>
                
                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-6">
                  <div className="w-12 h-12 rounded-full bg-[#c026d3] flex items-center justify-center text-white shadow-lg shadow-[#c026d3]/50 transform translate-y-4 group-hover/card:translate-y-0 transition-all duration-300">
                    {isCollection ? <LayerGroup size={20} className="ml-0" /> : <PlayCircle size={24} className="ml-1" />}
                  </div>
                </div>
              </div>
              <div className="flex flex-col flex-grow">
                <h3 className="font-bold text-sm md:text-base line-clamp-1 text-gray-100 group-hover/card:text-[#c026d3] transition-colors">{title}</h3>
                <div className="flex items-center justify-between text-xs text-gray-500 mt-1 font-medium">
                  {isCollection ? (
                    <span className="text-fuchsia-400/80 font-bold tracking-wide uppercase text-[10px]">Franchise</span>
                  ) : (
                    <div className="flex items-center">
                      <Calendar size={10} className="mr-1.5 opacity-70" />
                      <span>{year}</span>
                    </div>
                  )}
                  {item.resumeSeason && isTV && (
                    <span className="text-[#c026d3] font-bold bg-[#c026d3]/10 px-2 py-0.5 rounded">
                      S{item.resumeSeason} E{item.resumeEpisode}
                    </span>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const SectionGrid = ({ title, items, onSelect, onShowAll, icon }) => {
          if (!items || items.length === 0) return null;
          
          const displayItems = items.slice(0, 6);
          
          return (
            <div className="mb-12 container mx-auto px-4 lg:px-8">
              <div className="flex justify-between items-end mb-6">
                <h2 className="text-xl md:text-2xl font-bold text-white flex items-center gap-3">
                  <div className="w-1.5 h-6 bg-[#c026d3] rounded-full"></div>
                  {icon && <span className="text-[#c026d3]">{icon}</span>}
                  {title}
                </h2>
                {onShowAll && (
                  <button 
                    onClick={onShowAll} 
                    className="text-sm font-bold text-[#c026d3] hover:text-[#e879f9] flex items-center gap-1.5 transition-colors group/btn bg-[#c026d3]/10 px-4 py-1.5 rounded-full border border-[#c026d3]/20"
                  >
                    Show All <ChevronRight size={12} className="group-hover/btn:translate-x-1 transition-transform" />
                  </button>
                )}
              </div>
              
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 lg:gap-6 pt-2 pb-4">
                {displayItems.map((item, idx) => (
                  <MovieCard key={`${item.id}-${idx}`} item={item} onClick={onSelect} />
                ))}
              </div>
            </div>
          );
        };

        const HeroBanner = ({ item, onClick }) => {
          if (!item) return <div className="w-full h-[60vh] md:h-[75vh] bg-gray-900 animate-pulse rounded-b-[2.5rem]"></div>;
          
          const title = item.title || item.name;
          const isTV = item.media_type === 'tv';

          return (
            <div 
              className="relative w-full h-[60vh] md:h-[75vh] overflow-hidden mb-12 cursor-pointer group rounded-b-[2.5rem] md:rounded-b-[4rem] shadow-2xl" 
              onClick={() => onClick(item)}
            >
              <ImageWithFallback 
                src={item.backdrop_path || item.poster_path ? `${IMG_ORIGINAL}${item.backdrop_path || item.poster_path}` : null} 
                alt={title}
                className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105"
              />
              <div className="absolute inset-0 bg-gradient-to-t from-[#0a0c10] via-[#0a0c10]/60 to-transparent"></div>
              <div className="absolute inset-0 bg-gradient-to-r from-[#0a0c10]/90 via-[#0a0c10]/40 to-transparent"></div>
              
              <div className="absolute bottom-0 left-0 p-6 md:p-12 lg:px-20 lg:pb-20 w-full md:w-3/4 lg:w-2/3">
                <div className="flex items-center gap-3 mb-4 flex-wrap">
                   <span className="px-3 py-1 bg-white/10 backdrop-blur-md border border-white/20 text-white text-xs font-bold rounded-full uppercase tracking-wider flex items-center gap-1.5">
                     {isTV ? <Tv size={12} className="text-purple-400" /> : <Film size={12} className="text-indigo-400" />}
                     {isTV ? 'TV Series' : 'Movie'}
                   </span>
                   <span className="flex items-center gap-1.5 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-yellow-400 text-xs font-bold border border-yellow-400/20">
                     <Star size={12} className="text-yellow-400" />
                     {item.vote_average?.toFixed(1)} Rating
                   </span>
                </div>
                <h1 className="text-4xl md:text-5xl lg:text-7xl font-black text-white mb-4 leading-tight tracking-tight drop-shadow-lg">{title}</h1>
                <p className="text-gray-300 text-sm md:text-base lg:text-lg line-clamp-3 mb-8 max-w-3xl drop-shadow-md leading-relaxed">{item.overview}</p>
                <div className="flex items-center gap-4">
                  <button className="flex items-center gap-2 bg-[#c026d3] text-white px-8 py-4 rounded-full font-bold hover:bg-[#d946ef] transition-all duration-300 hover:shadow-lg hover:shadow-[#c026d3]/30 active:scale-95">
                    <PlayCircle size={20} className="text-white" />
                    Watch Now
                  </button>
                  <button className="flex items-center gap-2 bg-white/10 backdrop-blur-md text-white px-6 py-4 rounded-full font-bold hover:bg-white/20 transition-all duration-300 active:scale-95">
                    <Info size={20} />
                    Details
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // --- All Franchises View Component ---
        const AllFranchisesView = ({ onSelect, onBack }) => {
          const [franchises, setFranchises] = useState([]);
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            const fetchAllFranchises = async () => {
              setIsLoading(true);
              // Verified TMDB Collection IDs for 70+ Popular Franchises from the images
              const allFranchiseIds = [
                86311, 10, 1241, 119, 87096, 9485, 31514, 263, 531241, 448156, 284433,
                131272, 13143, 131262, 170855, 556, 574041, 645, 8735, 2344, 404609, 
                295, 328, 8650, 131635, 33514, 173710, 528, 8046, 395, 1729, 1575, 
                1574, 1573, 1572, 9643, 9309, 264, 84, 11481, 448150, 280, 86066, 
                10194, 2150, 115501, 77816, 119050, 8050, 133464, 17431, 123164,
                131004, 200542, 270381, 227092, 228106, 117781, 9735, 2250, 3034, 
                258836, 11979, 11961, 1570, 426105, 1569, 134444, 535167, 30588
              ];
              
              try {
                // IMPORTANT BUG FIX: BATCH FETCHING TO PREVENT TMDB 429 RATE LIMIT ERRORS
                let results = [];
                const batchSize = 10; // 10 requests at a time
                
                for (let i = 0; i < allFranchiseIds.length; i += batchSize) {
                  const batch = allFranchiseIds.slice(i, i + batchSize);
                  const promises = batch.map(id => fetch(`${TMDB_BASE_URL}/collection/${id}?api_key=${TMDB_KEY}`).then(r => r.json()));
                  const batchResults = await Promise.all(promises);
                  
                  results = [...results, ...batchResults];
                  
                  // Pause for a fraction of a second to respect TMDB limit
                  if (i + batchSize < allFranchiseIds.length) {
                    await new Promise(resolve => setTimeout(resolve, 300));
                  }
                }
                
                // Keep only valid successful collections
                const validResults = results.filter(c => c && c.id);
                
                const mapped = validResults.map(c => ({
                    ...c,
                    media_type: 'collection',
                    title: c.name
                }));
                setFranchises(mapped);
              } catch (error) {
                console.error("Error fetching all franchises", error);
              } finally {
                setIsLoading(false);
              }
            };
            fetchAllFranchises();
          }, []);

          return (
            <div className="container mx-auto px-4 lg:px-8 py-8 min-h-screen">
              <div className="flex items-center gap-4 mb-10">
                <button onClick={onBack} className="p-2 bg-gray-800 hover:bg-gray-700 rounded-full transition-colors text-white shadow-lg">
                  <ArrowLeft size={16} />
                </button>
                <h1 className="text-3xl md:text-4xl font-black text-white">All Popular Franchises</h1>
              </div>
              {isLoading ? (
                <div className="flex flex-col items-center justify-center my-32">
                   <div className="w-12 h-12 border-4 border-[#c026d3] border-t-transparent rounded-full animate-spin mb-4"></div>
                   <p className="text-[#c026d3] font-bold animate-pulse">Loading 70+ Collections...</p>
                </div>
              ) : (
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 lg:gap-6">
                  {franchises.map((item, idx) => (
                    <MovieCard key={`${item.id}-${idx}`} item={item} onClick={onSelect} />
                  ))}
                </div>
              )}
            </div>
          );
        };

        // --- Main Views ---
        const HomeView = ({ onSelect, onShowAll }) => {
          const [trendingMovies, setTrendingMovies] = useState([]);
          const [trendingTv, setTrendingTv] = useState([]);
          const [trendingAnime, setTrendingAnime] = useState([]);
          const [franchises, setFranchises] = useState([]);
          const [heroItem, setHeroItem] = useState(null);
          const [continueWatching, setContinueWatching] = useState([]);

          useEffect(() => {
            const historyStr = localStorage.getItem('cw_history');
            if (historyStr) {
               setContinueWatching(JSON.parse(historyStr));
            }

            const fetchHomeData = async () => {
              try {
                const [moviesRes, tvRes, animeRes] = await Promise.all([
                  fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_KEY}`).then(r => r.json()),
                  fetch(`${TMDB_BASE_URL}/trending/tv/week?api_key=${TMDB_KEY}`).then(r => r.json()),
                  fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_KEY}&with_genres=16&with_original_language=ja&sort_by=popularity.desc`).then(r => r.json())
                ]);
                
                const isNotAnime = (item) => !(item.original_language === 'ja' && item.genre_ids?.includes(16));
                
                const movies = moviesRes.results.filter(isNotAnime).map(m => ({ ...m, media_type: 'movie' }));
                const tvShows = tvRes.results.filter(isNotAnime).map(t => ({ ...t, media_type: 'tv' }));
                const anime = animeRes.results.map(a => ({ ...a, media_type: 'tv' }));
                
                setTrendingMovies(movies);
                setTrendingTv(tvShows);
                setTrendingAnime(anime);
                
                const franchiseIds = [86311, 10, 1241, 119, 9485, 87096];
                const franchisePromises = franchiseIds.map(id => fetch(`${TMDB_BASE_URL}/collection/${id}?api_key=${TMDB_KEY}`).then(r => r.json()));
                const franchiseResults = await Promise.all(franchisePromises);
                
                const mappedFranchises = franchiseResults.filter(c => c && c.id).map(c => ({
                    ...c,
                    media_type: 'collection',
                    title: c.name
                }));
                setFranchises(mappedFranchises);

                const allTrending = [...movies, ...tvShows, ...anime].filter(item => item.backdrop_path && item.vote_average > 7);
                if (allTrending.length > 0) {
                  setHeroItem(allTrending[Math.floor(Math.random() * allTrending.length)]);
                }
              } catch (error) {
                console.error("Error fetching home data:", error);
              }
            };
            
            fetchHomeData();
          }, []);

          return (
            <div className="pb-10">
              <HeroBanner item={heroItem} onClick={onSelect} />
              
              {continueWatching.length > 0 && (
                 <SectionGrid 
                    title="Continue Watching" 
                    icon={<Clock size={18} />}
                    items={continueWatching} 
                    onSelect={onSelect} 
                 />
              )}
              
              <SectionGrid title="Trending Movies" items={trendingMovies} onSelect={onSelect} onShowAll={() => onShowAll({type: 'movie', title: 'Trending Movies'})} />
              <SectionGrid title="Trending TV Shows" items={trendingTv} onSelect={onSelect} onShowAll={() => onShowAll({type: 'tv', title: 'Trending TV Shows'})} />
              <SectionGrid title="Trending Anime" items={trendingAnime} onSelect={onSelect} onShowAll={() => onShowAll({type: 'anime', title: 'Trending Anime'})} />
              <SectionGrid title="Popular Franchises" items={franchises} onSelect={onSelect} onShowAll={() => onShowAll({type: 'franchises', title: 'All Franchises'})} icon={<LayerGroup size={18} />} />
            </div>
          );
        };

        const FranchiseView = ({ item, onSelect, onBack }) => {
          const [movies, setMovies] = useState([]);
          const [shows, setShows] = useState([]);
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            const fetchFranchiseDetails = async () => {
              setIsLoading(true);
              try {
                const colRes = await fetch(`${TMDB_BASE_URL}/collection/${item.id}?api_key=${TMDB_KEY}`).then(r => r.json());
                const collectionMovies = (colRes.parts || []).map(m => ({ ...m, media_type: 'movie' }));
                
                collectionMovies.sort((a, b) => new Date(a.release_date) - new Date(b.release_date));
                setMovies(collectionMovies);

                const queryName = item.name.replace(' Collection', '').replace('The ', '').split(' - ')[0];
                const tvRes = await fetch(`${TMDB_BASE_URL}/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(queryName)}`).then(r => r.json());
                
                const relatedShows = (tvRes.results || []).filter(t => t.poster_path && t.vote_count > 5).map(t => ({ ...t, media_type: 'tv' }));
                
                relatedShows.sort((a, b) => b.popularity - a.popularity);
                setShows(relatedShows);

              } catch (error) {
                console.error("Error fetching franchise details:", error);
              } finally {
                setIsLoading(false);
              }
            };
            fetchFranchiseDetails();
          }, [item]);

          return (
            <div className="pb-20 animate-[fadeIn_0.5s_ease-in-out] min-h-screen">
              <div className="relative w-full h-[40vh] md:h-[50vh]">
                <ImageWithFallback

                    {shows.length > 0 && (
                      <div className="mb-12">
                        <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                          <div className="w-1.5 h-6 bg-[#c026d3] rounded-full"></div>
                          Related TV Shows & Anime

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 lg:gap-6">
                          {shows.map(s => <MovieCard key={`show-${s.id}`} item={s} onClick={onSelect} />)}
                        </div>
                      </div>

              </div>
            </div>
          );
        };

        const DiscoverView = ({ config, onSelect }) => {
          const [mediaType, setMediaType] = useState(config?.type === 'anime' ? 'anime' : (config?.type === 'tv' ? 'tv' : 'movie'));
          const [showFilters, setShowFilters] = useState(true);
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedGenres, setSelectedGenres] = useState([]);
          const [sortBy, setSortBy] = useState('popularity.desc');
          const [year, setYear] = useState('');
          const [rating, setRating] = useState('');
          const [language, setLanguage] = useState('');
          
          const [results, setResults] = useState([]);
          const [page, setPage] = useState(1);
          const [isLoading, setIsLoading] = useState(false);
          const [hasMore, setHasMore] = useState(true);
          const [totalResults, setTotalResults] = useState(0);

          const movieGenres = [
            {id: 28, name: 'Action'}, {id: 12, name: 'Adventure'}, {id: 16, name: 'Animation'}, {id: 35, name: 'Comedy'}, {id: 80, name: 'Crime'}, 
            {id: 99, name: 'Documentary'}, {id: 18, name: 'Drama'}, {id: 10751, name: 'Family'}, {id: 14, name: 'Fantasy'}, {id: 36, name: 'History'}, 
            {id: 27, name: 'Horror'}, {id: 10402, name: 'Music'}, {id: 9648, name: 'Mystery'}, {id: 10749, name: 'Romance'}, {id: 878, name: 'Sci-Fi'}, 
            {id: 53, name: 'Thriller'}, {id: 10752, name: 'War'}, {id: 37, name: 'Western'}
          ];

          const tvGenres = [
            {id: 10759, name: 'Action & Adventure'}, {id: 16, name: 'Animation'}, {id: 35, name: 'Comedy'}, {id: 80, name: 'Crime'}, 
            {id: 99, name: 'Documentary'}, {id: 18, name: 'Drama'}, {id: 10762, name: 'Kids'}, {id: 9648, name: 'Mystery'}, 
            {id: 10763, name: 'News'}, {id: 10764, name: 'Reality'}, {id: 10765, name: 'Sci-Fi & Fantasy'}, {id: 10766, name: 'Soap'}, 
            {id: 10767, name: 'Talk'}, {id: 10768, name: 'War & Politics'}, {id: 37, name: 'Western'}
          ];

          const currentGenres = (mediaType === 'movie') ? movieGenres : tvGenres;

          const toggleGenre = (id) => {
            setSelectedGenres(prev => prev.includes(id) ? prev.filter(g => g !== id) : [...prev, id]);
            setPage(1);
          };

          const handleMediaTypeChange = (type) => {
            setMediaType(type);
            setSelectedGenres([]);
            setPage(1);
          };

          const fetchResults = async (pageNum, append = false) => {
            setIsLoading(true);
            try {
              let url = '';
              if (searchQuery.trim()) {
                url = `${TMDB_BASE_URL}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(searchQuery)}&page=${pageNum}`;
              } else {
                let actualMediaType = mediaType === 'anime' ? 'tv' : mediaType;
                let actualSort = sortBy;
                
                if (actualMediaType === 'tv') {
                  if (sortBy === 'primary_release_date.desc') actualSort = 'first_air_date.desc';
                  if (sortBy === 'primary_release_date.asc') actualSort = 'first_air_date.asc';
                }
                
                url = `${TMDB_BASE_URL}/discover/${actualMediaType}?api_key=${TMDB_KEY}&page=${pageNum}&sort_by=${actualSort}`;
                
                let finalGenres = [...selectedGenres];
                if (mediaType === 'anime') {
                  finalGenres.push(16);
                  url += `&with_original_language=ja`;
                } else if (language) {
                  url += `&with_original_language=${language}`;
                }

                if (finalGenres.length > 0) url += `&with_genres=${finalGenres.join('|')}`;
                
                if (year) {
                  if (actualMediaType === 'movie') url += `&primary_release_year=${year}`;
                  else url += `&first_air_date_year=${year}`;
                }
                if (rating) url += `&vote_average.gte=${rating}&vote_count.gte=100`;
              }

              const res = await fetch(url);
              const data = await res.json();
              
              let fetchedResults = data.results.filter(item => item.media_type !== 'person' && item.poster_path);
              
              if (mediaType !== 'anime') {
                  const isNotAnime = (item) => !(item.original_language === 'ja' && item.genre_ids?.includes(16));
                  fetchedResults = fetchedResults.filter(isNotAnime);
              }
              
              fetchedResults = fetchedResults.map(item => ({ ...item, media_type: item.media_type || (mediaType === 'anime' ? 'tv' : mediaType) }));
              
              if (append) {
                setResults(prev => [...prev, ...fetchedResults]);
              } else {
                setResults(fetchedResults);
              }
              
              setTotalResults(data.total_results || 0);
              setHasMore(data.page < data.total_pages);
            } catch (error) {
              console.error("Discover fetch error:", error);
            } finally {
              setIsLoading(false);
            }
          };

          useEffect(() => {
            const delayDebounceFn = setTimeout(() => {
              setPage(1);
              fetchResults(1, false);
            }, 500);
            return () => clearTimeout(delayDebounceFn);
          }, [searchQuery]);

          useEffect(() => {
            if (!searchQuery.trim()) {
              setPage(1);
              fetchResults(1, false);
            }
          }, [mediaType, selectedGenres, sortBy, year, rating, language]);

          useEffect(() => {
            if (page > 1) fetchResults(page, true);
          }, [page]);

          return (
            <div className="container mx-auto px-4 lg:px-8 py-8 min-h-screen">
              {/* Header */}
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                  <h1 className="text-3xl md:text-4xl font-black text-white">Discover</h1>
                  <p className="text-gray-400 mt-1">Find exactly what you want to watch</p>
                </div>
                
                <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Search size={16} className="text-gray-400" />
                    </div>
                    <input
                      type="text"
                      className="w-full sm:w-64 bg-gray-900 border border-gray-700 text-white rounded-lg py-2.5 pl-10 pr-4 focus:outline-none focus:border-[#c026d3] transition-colors text-sm"
                      placeholder="Search by title..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  <button 
                    onClick={() => setShowFilters(!showFilters)}
                    className="flex items-center justify-center gap-2 border border-gray-700 bg-gray-900 px-4 py-2.5 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800 transition-colors whitespace-nowrap"
                  >
                    <FilterIcon size={14} /> {showFilters ? 'Hide Filters' : 'Show Filters'}
                  </button>
                </div>
              </div>

              {/* Filters Panel */}
              {showFilters && !searchQuery.trim() && (
                <div className="bg-[#111318] border border-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
                  {/* Type */}
                  <div className="mb-6">
                    <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-3">Type</h3>
                    <div className="flex gap-2 flex-wrap">
                      <button 
                        onClick={() => handleMediaTypeChange('movie')}
                        className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${mediaType === 'movie' ? 'bg-[#c026d3] text-white shadow-[0_0_15px_rgba(192,38,211,0.4)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}
                      >
                        Movies
                      </button>
                      <button 
                        onClick={() => handleMediaTypeChange('tv')}
                        className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${mediaType === 'tv' ? 'bg-[#c026d3] text-white shadow-[0_0_15px_rgba(192,38,211,0.4)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}
                      >
                        TV Shows
                      </button>
                      <button 
                        onClick={() => handleMediaTypeChange('anime')}
                        className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${mediaType === 'anime' ? 'bg-[#c026d3] text-white shadow-[0_0_15px_rgba(192,38,211,0.4)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}
                      >
                        Anime
                      </button>
                    </div>
                  </div>

                  {/* Genres */}
                  <div className="mb-6">
                    <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-3">Genres</h3>
                    <div className="flex flex-wrap gap-2">
                      {currentGenres.map(g => {
                        if (mediaType === 'anime' && g.id === 16) return null; // Anime me animation tab hide
                        return (
                          <button 
                            key={g.id} 
                            onClick={() => toggleGenre(g.id)}
                            className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all border ${selectedGenres.includes(g.id) ? 'bg-gray-200 text-black border-gray-200' : 'bg-transparent text-gray-400 border-gray-700 hover:border-gray-500'}`}
                          >
                            {g.name}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Dropdowns */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                      <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Sort By</h3>
                      <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:border-[#c026d3] cursor-pointer">
                        <option value="popularity.desc">Most Popular</option>
                        <option value="vote_average.desc">Highest Rated</option>
                        <option value="primary_release_date.desc">Newest</option>
                        <option value="primary_release_date.asc">Oldest</option>
                      </select>
                    </div>
                    <div>
                      <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Year</h3>
                      <select value={year} onChange={(e) => setYear(e.target.value)} className="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:border-[#c026d3] cursor-pointer">
                        <option value="">Any Year</option>
                        {Array.from({length: 50}, (_, i) => new Date().getFullYear() - i).map(y => <option key={y} value={y}>{y}</option>)}
                      </select>
                    </div>
                    <div>
                      <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Rating</h3>
                      <select value={rating} onChange={(e) => setRating(e.target.value)} className="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:border-[#c026d3] cursor-pointer">
                        <option value="">Any Rating</option>
                        <option value="9">9+ Stars</option>
                        <option value="8">8+ Stars</option>
                        <option value="7">7+ Stars</option>
                        <option value="6">6+ Stars</option>
                        <option value="5">5+ Stars</option>
                      </select>
                    </div>
                    {mediaType !== 'anime' && (
                      <div>
                        <h3 className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Language</h3>
                        <select value={language} onChange={(e) => setLanguage(e.target.value)} className="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:border-[#c026d3] cursor-pointer">
                          <option value="">Any Language</option>
                          <option value="en">English</option>
                          <option value="hi">Hindi</option>
                          <option value="ja">Japanese</option>
                          <option value="ko">Korean</option>
                          <option value="es">Spanish</option>
                          <option value="fr">French</option>
                        </select>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Results */}
              <div className="mb-4 text-sm text-gray-400 font-medium">
                {isLoading && page === 1 ? 'Searching...' : `Showing ${totalResults.toLocaleString()} results`}
              </div>

              {results.length > 0 ? (
                <>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 lg:gap-6">
                    {results.map((item, idx) => (
                      <MovieCard key={`${item.id}-${idx}`} item={item} onClick={onSelect} />
                    ))}
                  </div>
                  
                  {hasMore && (
                    <div className="flex justify-center mt-12 mb-8">
                      <button 
                        onClick={() => setPage(p => p + 1)}
                        disabled={isLoading}
                        className="bg-gray-800 hover:bg-gray-700 text-white px-8 py-3 rounded-lg font-bold transition-all border border-gray-700 hover:border-gray-500 disabled:opacity-50 flex items-center gap-3 shadow-lg"
                      >
                        {isLoading ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : null}
                        {isLoading ? 'Loading...' : 'Load More'}
                      </button>
                    </div>
                  )}
                </>
              ) : !isLoading ? (
                <div className="text-center text-gray-500 my-20 bg-gray-900/50 rounded-2xl py-16 border border-gray-800">
                  <Search size={48} className="mx-auto mb-4 opacity-20" />
                  <p className="text-xl text-gray-400 font-bold mb-2">No results found</p>
                  <p className="text-sm">Try adjusting your filters or search query.</p>
                </div>
              ) : null}
              
              {isLoading && results.length === 0 && (
                <div className="flex justify-center my-32">
                  <div className="w-12 h-12 border-4 border-[#c026d3] border-t-transparent rounded-full animate-spin"></div>
                </div>
              )}
            </div>
          );
        };

        const DetailsView = ({ item, onBack, onSelect }) => {
          const isMovie = item.media_type === 'movie' || (!item.media_type && item.title);
          const title = item.title || item.name;
          const date = item.release_date || item.first_air_date;
          const year = date ? date.split('-')[0] : 'N/A';
          
          const [tvDetails, setTvDetails] = useState(null);
          const [similarItems, setSimilarItems] = useState([]);
          
          const [activeSeason, setActiveSeason] = useState(item.resumeSeason || 1);
          const [activeEpisode, setActiveEpisode] = useState(item.resumeEpisode || 1);
          const [episodes, setEpisodes] = useState([]);
          const [isLoadingSeason, setIsLoadingSeason] = useState(false);

          // Server integration & testing states
          const [activeServer, setActiveServer] = useState(null);
          const [isTestingServers, setIsTestingServers] = useState(true);
          const [serverStats, setServerStats] = useState({ vidsrc: null, godrive: null });
          const [imdbId, setImdbId] = useState(null);

          const playerRef = useRef(null);

          // History Save effect
          useEffect(() => {
            if (item && item.id) {
               const historyStr = localStorage.getItem('cw_history') || '[]';
               let history = JSON.parse(historyStr);
               history = history.filter(h => h.id !== item.id);
               const newItem = { 
                   ...item, 
                   resumeSeason: isMovie ? null : activeSeason, 
                   resumeEpisode: isMovie ? null : activeEpisode 
               };
               history.unshift(newItem);
               history = history.slice(0, 12);
               localStorage.setItem('cw_history', JSON.stringify(history));
            }
          }, [item, activeSeason, activeEpisode, isMovie]);

          // TMDB details fetcher
          useEffect(() => {
            if (isMovie) {
              fetch(`${TMDB_BASE_URL}/movie/${item.id}?api_key=${TMDB_KEY}`)
                .then(res => res.json())
                .then(data => setImdbId(data.imdb_id))
                .catch(err => console.error("Error fetching movie details:", err));
            } else {
              fetch(`${TMDB_BASE_URL}/tv/${item.id}?api_key=${TMDB_KEY}`)
                .then(res => res.json())
                .then(data => {
                  setTvDetails(data);
                  if (!item.resumeSeason && data.seasons && data.seasons.length > 0) {
                    const defaultSeason = data.seasons.find(s => s.season_number === 1) || data.seasons[0];
                    setActiveSeason(defaultSeason.season_number);
                  }
                });
            }
          }, [item.id, isMovie, item.resumeSeason]);

          // Server Ping Test (Auto Selection)
          useEffect(() => {
            let isMounted = true;
            
            const testAndSelectServer = async () => {
              setIsTestingServers(true);
              setServerStats({ vidsrc: null, godrive: null });
              
              // Dono servers ko ek saath ping karein
              const [vidsrcTime, godriveTime] = await Promise.all([
                pingServer('https://vidsrc-embed.ru/'),
                pingServer('https://godriveplayer.com/')
              ]);

              if (!isMounted) return;

              setServerStats({ vidsrc: vidsrcTime, godrive: godriveTime });

              // Thoda sa delay dete hain taaki user UI dekh sake
              setTimeout(() => {
                 if (!isMounted) return;
                 // Jiska time kam hai (matlab jo tez hai) usko active server set kar dein
                 if (godriveTime < vidsrcTime) {
                   setActiveServer('godrive');
                 } else {
                   setActiveServer('vidsrc');
                 }
                 setIsTestingServers(false);
              }, 1200);
            };

            testAndSelectServer();

            return () => { isMounted = false; };
          }, [item.id]);

          // Episode fetcher
          useEffect(() => {
            if (!isMovie && activeSeason !== null) {
              setIsLoadingSeason(true);
              fetch(`${TMDB_BASE_URL}/tv/${item.id}/season/${activeSeason}?api_key=${TMDB_KEY}`)
                .then(res => res.json())
                .then(data => {
                  setEpisodes(data.episodes || []);
                  setIsLoadingSeason(false);
                  if (!item.resumeEpisode || activeSeason !== item.resumeSeason) {
                     if (data.episodes && data.episodes.length > 0) {
                       setActiveEpisode(data.episodes[0].episode_number);
                     }
                  }
                })
                .catch(() => setIsLoadingSeason(false));
            }
          }, [item.id, isMovie, activeSeason, item.resumeSeason, item.resumeEpisode]);

          // Similar Items fetcher
          useEffect(() => {
            const fetchSimilar = async () => {
              try {
                const type = isMovie ? 'movie' : 'tv';
                const res = await fetch(`${TMDB_BASE_URL}/${type}/${item.id}/similar?api_key=${TMDB_KEY}`);
                const data = await res.json();
                
                // Sirf wahi items lein jinke paas poster hai
                const mapped = (data.results || []).filter(i => i.poster_path).map(i => ({
                  ...i,
                  media_type: type
                }));
                setSimilarItems(mapped);
              } catch (err) {
                console.error("Error fetching similar items:", err);
              }
            };
            fetchSimilar();
          }, [item.id, isMovie]);

          // Embed URLs
          const embedUrlVidsrc = isMovie
            ? `https://vidsrc-embed.ru/embed/movie?tmdb=${item.id}`
            : `https://vidsrc-embed.ru/embed/tv?tmdb=${item.id}&season=${activeSeason}&episode=${activeEpisode}`;

          const embedUrlGodrive = isMovie
            ? `https://godriveplayer.com/player.php?imdb=${imdbId || ''}`
            : `https://godriveplayer.com/player.php?type=series&tmdb=${item.id}&season=${activeSeason}&episode=${activeEpisode}`;

          const activeEmbedUrl = activeServer === 'vidsrc' ? embedUrlVidsrc : embedUrlGodrive;

          const handleEpisodeClick = (epNum) => {
            setActiveEpisode(epNum);
            if (playerRef.current) {
              playerRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          };

          return (
            <div className="pb-20 animate-[fadeIn_0.5s_ease-in-out]">
              <div className="relative w-full h-[40vh] md:h-[50vh]">
                <ImageWithFallback 
                  src={item.backdrop_path ? `${IMG_ORIGINAL}${item.backdrop_path}` : null}
                  alt={title}
                  className="w-full h-full object-cover"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-[#0a0c10] via-[#0a0c10]/80 to-[#0a0c10]/20"></div>
                
                <div className="absolute top-6 left-4 lg:left-8 z-10">
                  <button 
                    onClick={onBack} 
                    className="flex items-center gap-2 bg-black/40 hover:bg-black/70 backdrop-blur-md text-white px-4 py-2 rounded-full transition-all border border-white/10 shadow-lg group"
                  >
                    <ArrowLeft size={16} className="group-hover:-translate-x-1 transition-transform" />
                    <span className="font-medium">Back</span>
                  </button>
                </div>
              </div>

              <div className="container mx-auto px-4 lg:px-8 -mt-32 md:-mt-48 relative z-10">
                <div className="flex flex-col md:flex-row gap-8 lg:gap-12 mb-12">
                  <div className="w-48 md:w-64 lg:w-72 flex-shrink-0 mx-auto md:mx-0 rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
                    <ImageWithFallback 
                      src={item.poster_path ? `${IMG_BASE}${item.poster_path}` : null}
                      alt={title}
                      className="w-full h-full aspect-[2/3] object-cover"
                    />
                  </div>

                  <div className="flex-grow pt-4 md:pt-16 lg:pt-24 text-center md:text-left">
                    <div className="flex items-center justify-center md:justify-start gap-3 mb-4 flex-wrap">
                      <span className="px-3 py-1 bg-white/10 backdrop-blur-md border border-white/10 text-white text-xs font-bold rounded-md uppercase tracking-wider">
                        {isMovie ? 'Movie' : 'TV Series'}
                      </span>
                      <span className="text-gray-400 font-medium">{year}</span>
                      <span className="flex items-center gap-1 text-yellow-400 font-bold bg-yellow-400/10 px-2 py-0.5 rounded-md">
                        <Star size={12} className="text-yellow-400" />
                        {item.vote_average?.toFixed(1)}
                      </span>
                    </div>
                    <h1 className="text-3xl md:text-4xl lg:text-5xl font-black text-white mb-6 leading-tight">{title}</h1>
                    <p className="text-gray-300 text-sm md:text-base leading-relaxed max-w-4xl">{item.overview || "No overview available."}</p>
                  </div>
                </div>

                {/* Server Selection UI */}
                <div className="max-w-6xl mx-auto mb-6 flex flex-wrap items-center gap-3 px-4 lg:px-0">
                  <span className="text-gray-400 text-sm font-bold flex items-center gap-2 mr-2">
                     <ServerIcon size={14} /> Servers:
                  </span>
                  
                  <button 
                    onClick={() => setActiveServer('vidsrc')}
                    disabled={isTestingServers}
                    className={`px-5 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeServer === 'vidsrc' ? 'bg-[#c026d3] text-white shadow-[0_0_15px_rgba(192,38,211,0.4)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'} disabled:opacity-50 disabled:cursor-not-allowed`}
                  >
                    VidSrc Player
                    {!isTestingServers && serverStats.vidsrc <= serverStats.godrive && <span className="text-yellow-400">⚡</span>}
                  </button>
                  
                  <button 
                    onClick={() => setActiveServer('godrive')}
                    disabled={isTestingServers}
                    className={`px-5 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeServer === 'godrive' ? 'bg-[#c026d3] text-white shadow-[0_0_15px_rgba(192,38,211,0.4)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'} disabled:opacity-50 disabled:cursor-not-allowed`}
                  >
                    GoDrive Player
                    {!isTestingServers && serverStats.godrive < serverStats.vidsrc && <span className="text-yellow-400">⚡</span>}
                  </button>
                </div>

                <div ref={playerRef} className="w-full max-w-6xl mx-auto bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800 mb-12 min-h-[300px]">
                  <div className="bg-gray-950 p-4 border-b border-gray-800 flex items-center gap-3">
                    <PlayCircle size={18} className="text-[#c026d3]" />
                    <span className="font-bold text-white tracking-wide">
                      {isMovie ? 'Now Playing' : `Playing: Season ${activeSeason} • Episode ${activeEpisode}`}
                    </span>
                  </div>
                  <div className="relative w-full aspect-video bg-black overflow-hidden">
                    
                    {/* Server Testing Animation Overlay */}
                    {isTestingServers ? (
                       <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-gray-950 z-20">
                           <div className="w-12 h-12 border-4 border-[#c026d3] border-t-transparent rounded-full animate-spin"></div>
                           <p className="text-[#c026d3] font-bold text-lg md:text-xl animate-pulse text-center px-4">Connecting to fastest server...</p>
                           <div className="flex gap-8 mt-2 text-sm text-gray-400 font-mono">
                               <span>VidSrc: {serverStats.vidsrc ? `${serverStats.vidsrc}ms` : 'Ping...'}</span>
                               <span>GoDrive: {serverStats.godrive ? `${serverStats.godrive}ms` : 'Ping...'}</span>
                           </div>
                       </div>
                    ) : activeServer === 'godrive' && isMovie && !imdbId ? (
                      <div className="absolute inset-0 flex flex-col items-center justify-center gap-4">
                         <div className="w-8 h-8 border-4 border-[#c026d3] border-t-transparent rounded-full animate-spin"></div>
                         <p className="text-gray-400 text-sm font-medium">Connecting to server...</p>
                      </div>
                    ) : (
                      <iframe 
                        key={`${activeServer}-${activeEmbedUrl}`}
                        src={activeEmbedUrl}
                        width="100%"
                        height="100%"
                        frameBorder="0"
                        scrolling="no"
                        allowFullScreen
                        webkitallowfullscreen="true"
                        mozallowfullscreen="true"
                        className="absolute top-0 left-0 w-full h-full border-0"
                        title="Video Player"
                      ></iframe>
                    )}
                  </div>
                </div>

                {!isMovie && tvDetails && tvDetails.seasons && (
                  <div className="max-w-6xl mx-auto">
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                      <Tv size={20} className="text-indigo-500" />
                      Seasons & Episodes
                    </h2>
                    
                    <div className="flex gap-3 overflow-x-auto pb-4 mb-6 hide-scrollbar">
                      {tvDetails.seasons.filter(s => s.season_number > 0).map(season => (
                        <button
                          key={season.season_number}
                          onClick={() => setActiveSeason(season.season_number)}
                          className={`px-5 py-2.5 rounded-xl font-bold whitespace-nowrap transition-all duration-300 ${
                            activeSeason === season.season_number 
                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 transform scale-105' 
                            : 'bg-gray-900 text-gray-400 hover:bg-gray-800 hover:text-white border border-gray-800'
                          }`}
                        >
                          Season {season.season_number}
                        </button>
                      ))}
                    </div>

                    {isLoadingSeason ? (
                      <div className="flex justify-center py-12">
                         <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {episodes.map(ep => {
                          const isActive = activeEpisode === ep.episode_number;
                          return (
                            <div
                              key={ep.episode_number}
                              onClick={() => handleEpisodeClick(ep.episode_number)}
                              className={`group p-3 rounded-2xl cursor-pointer flex gap-4 transition-all duration-300 border ${
                                isActive 
                                ? 'bg-indigo-900/30 border-indigo-500/50 shadow-lg shadow-indigo-900/20' 
                                : 'bg-gray-900/50 border-gray-800 hover:bg-gray-800 hover:border-gray-700'
                              }`}
                            >
                              <div className="w-28 sm:w-32 flex-shrink-0 relative rounded-xl overflow-hidden aspect-video bg-gray-800">
                                <ImageWithFallback 
                                  src={ep.still_path ? `${IMG_BASE}${ep.still_path}` : null} 
                                  alt={ep.name} 
                                  className={`w-full h-full object-cover transition-transform duration-500 ${!isActive && 'group-hover:scale-110'}`} 
                                />
                                {isActive && (
                                  <div className="absolute inset-0 bg-indigo-600/40 flex items-center justify-center backdrop-blur-[1px]">
                                    <PlayCircle size={24} className="text-white shadow-lg" />
                                  </div>
                                )}
                              </div>
                              <div className="flex flex-col justify-center pr-2 py-1">
                                <div className={`font-bold text-sm line-clamp-2 ${isActive ? 'text-indigo-400' : 'text-gray-200 group-hover:text-white'}`}>
                                  {ep.episode_number}. {ep.name}
                                </div>
                                <div className="text-xs text-gray-500 mt-1.5 flex items-center gap-1.5">
                                  <Calendar size={10} />
                                  {ep.air_date ? ep.air_date.split('-')[0] : 'N/A'}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}

                {/* Similar Items Section */}
                {similarItems.length > 0 && (
                  <div className="max-w-6xl mx-auto mt-16 mb-8">
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                      <div className="w-1.5 h-6 bg-[#c026d3] rounded-full"></div>
                      Similar {isMovie ? 'Movies' : 'TV Shows'}
                    </h2>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 lg:gap-6">
                      {similarItems.slice(0, 12).map((simItem, idx) => (
                        <MovieCard key={`sim-${simItem.id}-${idx}`} item={simItem} onClick={onSelect} />
                      ))}
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        };

        // --- Main App Component ---
        const App = () => {
          const [view, setView] = useState('home');
          const [previousView, setPreviousView] = useState('home');
          const [selectedItem, setSelectedItem] = useState(null);
          const [discoverConfig, setDiscoverConfig] = useState(null);
          const [selectedFranchise, setSelectedFranchise] = useState(null);

          useEffect(() => {
            const faviconUrl = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%237c3aed"/><stop offset="50%" stop-color="%23d946ef"/><stop offset="100%" stop-color="%23f97316"/></linearGradient></defs><rect width="100" height="100" rx="20" fill="url(%23g)"/><text x="50" y="68" font-family="Arial" font-size="60" font-weight="bold" fill="white" text-anchor="middle">∞</text></svg>';

            const setHeadElement = (tagType, attrName, attrValue, contentAttr, content) => {
              let element = document.querySelector(`${tagType}[${attrName}="${attrValue}"]`);
              if (!element) {
                element = document.createElement(tagType);
                element.setAttribute(attrName, attrValue);
                document.head.appendChild(element);
              }
              element.setAttribute(contentAttr, content);
            };

            setHeadElement('link', 'rel', 'icon', 'href', faviconUrl);
            setHeadElement('link', 'rel', 'apple-touch-icon', 'href', faviconUrl);
            setHeadElement('meta', 'property', 'og:title', 'content', 'Cinephiler Paradox');
            setHeadElement('meta', 'property', 'og:description', 'content', 'Discover and watch the best trending movies and TV shows.');
            setHeadElement('meta', 'property', 'og:image', 'content', faviconUrl);

            // --- Browser History (Back Button) Setup ---
            const initialState = { 
              view: 'home', 
              previousView: 'home', 
              selectedItem: null, 
              discoverConfig: null, 
              selectedFranchise: null 
            };
            window.history.replaceState(initialState, '', '');

            const handlePopState = (event) => {
              if (event.state) {
                setView(event.state.view);
                setPreviousView(event.state.previousView);
                setSelectedItem(event.state.selectedItem);
                setDiscoverConfig(event.state.discoverConfig);
                setSelectedFranchise(event.state.selectedFranchise);
              }
            };

            window.addEventListener('popstate', handlePopState);
            return () => window.removeEventListener('popstate', handlePopState);
          }, []);

          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }, [view, selectedItem]);

          const navigateTo = (newState) => {
            const fullState = {
              view: newState.view !== undefined ? newState.view : view,
              previousView: newState.previousView !== undefined ? newState.previousView : previousView,
              selectedItem: newState.selectedItem !== undefined ? newState.selectedItem : selectedItem,
              discoverConfig: newState.discoverConfig !== undefined ? newState.discoverConfig : discoverConfig,
              selectedFranchise: newState.selectedFranchise !== undefined ? newState.selectedFranchise : selectedFranchise,
            };
            
            window.history.pushState(fullState, '', '');
            
            setView(fullState.view);
            setPreviousView(fullState.previousView);
            setSelectedItem(fullState.selectedItem);
            setDiscoverConfig(fullState.discoverConfig);
            setSelectedFranchise(fullState.selectedFranchise);
          };

          const handleSelect = (item) => {
            if (item.media_type === 'collection') {
              navigateTo({ view: 'franchise', previousView: view, selectedFranchise: item, selectedItem: null });
            } else {
              navigateTo({ view: 'details', previousView: view, selectedItem: item });
            }
          };

          const handleShowAll = (config) => {
            if (config.type === 'franchises') {
              navigateTo({ view: 'all_franchises', previousView: view, discoverConfig: null });
            } else {
              navigateTo({ view: 'discover', previousView: view, discoverConfig: config });
            }
          };

          const handleBack = () => {
            if (window.history.state && window.history.length > 1) {
              window.history.back();
            } else {
              navigateTo({ view: 'home', selectedItem: null, selectedFranchise: null, discoverConfig: null });
            }
          };

          const handleNav = (newView) => {
            if (view === newView) return;
            navigateTo({
              view: newView,
              previousView: 'home',
              discoverConfig: newView === 'discover' ? null : discoverConfig,
              selectedItem: null,
              selectedFranchise: null
            });
          };

          return (
            <div className="min-h-screen flex flex-col">
              <Navbar view={view} setView={handleNav} />
              
              <main className="flex-grow">
                {view === 'home' && <HomeView onSelect={handleSelect} onShowAll={handleShowAll} />}
                {view === 'all_franchises' && <AllFranchisesView onSelect={handleSelect} onBack={handleBack} />}
                {view === 'franchise' && selectedFranchise && <FranchiseView item={selectedFranchise} onSelect={handleSelect} onBack={handleBack} />}
                {view === 'discover' && <DiscoverView config={discoverConfig} onSelect={handleSelect} />}
                {view === 'details' && selectedItem && <DetailsView item={selectedItem} onBack={handleBack} onSelect={handleSelect} />}
              </main>
              
              <footer className="border-t border-gray-900 bg-[#06080a] py-8 text-center text-gray-500 text-sm mt-auto">
                <div className="container mx-auto flex flex-col items-center justify-center gap-2">
                  <div className="flex items-center gap-2 text-gray-400 font-bold mb-2">
                    <InfinityIcon size={18} className="text-fuchsia-500" /> 
                    <span className="bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-orange-400">Cinephiler Paradox</span>
                  </div>
                  <p>Powered by TMDB • Video delivery by vidsrc & godrive</p>
                  <p className="text-xs opacity-50 mt-2">&copy; {new Date().getFullYear()} Cinephiler Paradox. All rights reserved.</p>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
